<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justificativa de Faltas - EM Sobral Pinto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(135deg, #d4af37 0%, #f1c40f 100%); --dark: #2c3e50; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; }
        header { background: var(--gold); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 600px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: var(--dark); color: white; padding: 15px; text-align: center; }
        .card-body { padding: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: #f1c40f; outline: none; background: #fffdf5; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 16px; background: var(--gold); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(241, 196, 15, 0.4); }
        #msg { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header>
        <div><h1>EM Sobral Pinto</h1></div>
        <div style="text-align: right; font-size: 0.8rem;">Portal do Responsável<br><b>Justificativa de Faltas</b></div>
    </header>
    <div class="container">
        <div class="card">
            <div class="card-header">Preencha os dados abaixo</div>
            <div class="card-body">
                <form id="formFaltas">
                    <div class="form-group">
                        <label>Turma:</label>
                        <select id="turma" required onchange="carregarAlunos()"><option value="">Carregando...</option></select>
                    </div>
                    <div class="form-group">
                        <label>Aluno:</label>
                        <select id="aluno" required><option value="">Selecione a turma</option></select>
                    </div>
                    <div class="row">
                        <div class="form-group"><label>Início:</label><input type="date" id="inicio" required></div>
                        <div class="form-group"><label>Fim:</label><input type="date" id="fim" required></div>
                    </div>
                    <div class="form-group">
                        <label>Motivo:</label>
                        <textarea id="motivo" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Nome do Responsável:</label>
                        <input type="text" id="responsavel" required>
                    </div>
                    <div class="form-group">
                        <label>Vínculo:</label>
                        <select id="vinculo" required>
                            <option value="Pai">Pai</option><option value="Mãe">Mãe</option><option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Anexo (Atestado/Foto):</label>
                        <input type="file" id="arquivo" accept="image/*,.pdf">
                    </div>
                    <button type="submit" id="btn">Enviar Justificativa</button>
                </form>
                <div id="msg"></div>
            </div>
        </div>
    </div>
    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwlVbz3C-bdKUbRvuWx4SrL9eiFdmyRwwZwUYVhi9u8u2df9NSgNRNjsYx7gD5q1qef7g/exec";
        let db = {};
        window.onload = async () => {
            const res = await fetch(`${URL_SCRIPT}?acao=getDadosPublicosForm`);
            db = await res.json();
            const selT = document.getElementById('turma');
            selT.innerHTML = '<option value="">Selecione...</option>';
            Object.keys(db).sort().forEach(t => selT.innerHTML += `<option value="${t}">${t}</option>`);
        };
        function carregarAlunos() {
            const t = document.getElementById('turma').value;
            const selA = document.getElementById('aluno');
            selA.innerHTML = '<option value="">Selecione...</option>';
            if(db[t]) db[t].sort().forEach(a => selA.innerHTML += `<option value="${a}">${a}</option>`);
        }
        document.getElementById('formFaltas').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            btn.disabled = true; btn.innerText = "ENVIANDO...";
            let fileData = { base64: "", mimeType: "", nome: "" };
            const fileInput = document.getElementById('arquivo');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileData.mimeType = file.type;
                fileData.nome = file.name;
                const reader = new FileReader();
                fileData.base64 = await new Promise(r => {
                    reader.onload = () => r(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
            }
            const payload = {
                acao: "salvarJustificativa",
                turma: document.getElementById('turma').value,
                aluno: document.getElementById('aluno').value,
                dataInicio: document.getElementById('inicio').value,
                dataFim: document.getElementById('fim').value,
                motivo: document.getElementById('motivo').value,
                responsavel: document.getElementById('responsavel').value,
                parentesco: document.getElementById('vinculo').value,
                arquivo: fileData
            };
            try {
                const res = await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(payload) });
                const txt = await res.text();
                if(txt.includes("Sucesso")){
                    msg.innerText = "Sucesso! Enviado."; msg.className = "success"; msg.style.display = "block";
                    document.getElementById('formFaltas').reset();
                } else { throw new Error(txt); }
            } catch (err) { msg.innerText = "Erro: " + err.message; msg.className = "error"; msg.style.display = "block";
            } finally { btn.disabled = false; btn.innerText = "Enviar Justificativa"; }
        };
    </script>
</body>
</html>
